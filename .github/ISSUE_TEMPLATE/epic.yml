name: Epic
description: Feature domain epic — MVP scope
title: "[Epic][F-XX] "
labels:
  - type:epic
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true

  - type: dropdown
    id: feature
    attributes:
      label: Feature domain
      options:
        - F-01 Auth
        - F-02 Users
        - F-03 Workspace
        - F-04 Projects
        - F-05 Categories/tasks
        - F-06 Timer
        - F-07 Timelogs
        - F-08 Timesheets
        - F-10 Reporting
        - F-11 Presence
        - F-12 Export
        - F-13 Notifications
        - F-14 Assistant
        - F-15 Onboarding
        - F-X Platform
    validations:
      required: true

  - type: textarea
    id: shipped
    attributes:
      label: Shipped evidence (paths)
      description: API, client, admin, spec, tests
    validations:
      required: true

  - type: textarea
    id: gaps
    attributes:
      label: Gap stories (checklist)
      value: |
        - [ ] #
        - [ ] #
    validations:
      required: false

  - type: textarea
    id: out_mvp
    attributes:
      label: Out of MVP (do not file)
      value: Budget, billing, revenue, client portal
    validations:
      required: true
