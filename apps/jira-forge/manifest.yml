modules:
  function:
    - key: resolver
      handler: resolvers/index.handler
  jira:issuePanel:
    - key: chronomint-issue-panel
      resource: panel
      resolver:
        function: resolver
      title: ChronoMint
      viewportSize: medium
resources:
  - key: panel
    path: static/panel/dist
permissions:
  scopes:
    - read:jira-work
  external:
    fetch:
      backend:
        - address: https://*
        - address: http://localhost:*
        - address: http://127.0.0.1:*
app:
  runtime:
    name: nodejs22.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/00000000-0000-0000-0000-000000000000
