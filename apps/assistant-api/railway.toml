# Assistant API — Railway service config
# https://docs.railway.com/guides/config-as-code
#
# On the assistant-api Railway service:
#   Settings → Config-as-code → Config file path: apps/assistant-api/railway.toml
#   Root directory can stay / (repo root) — this file overrides the root railway.toml.
#
# See docs/runbooks/railway.md § Assistant API service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/assistant-api/Dockerfile"
watchPatterns = ["apps/assistant-api/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
