# Assistant API — Railway service config
# https://docs.railway.com/guides/config-as-code
#
# Railway monorepo setup (recommended):
#   Root Directory: assistant-api /  (apps/assistant-api)
#   Config file path: /apps/assistant-api/railway.toml
#
# Paths in this file are relative to Root Directory when it is apps/assistant-api.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
